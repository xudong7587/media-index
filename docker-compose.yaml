services:
  media-index:
    image: ghcr.io/xudong7587/media-index:latest
    pull_policy: always
    container_name: media-index
    ports:
      - "38000:8000"
    environment:
      # 启动前请修改用户名和密码，应用会拒绝空密码以及密码 admin。
      MEDIA_USER: admin
      MEDIA_PASS: change-this-password
      # 下方是同一 Compose 中 PanSou/QAS 的默认容器地址。
      # QAS Token 需在 QAS 启动后从其网页“API -> Token”复制，再到 MediaIndex 设置页填写。
      QAS_BASE_URL: http://quark-auto-save:5005
      QAS_TOKEN: ""
      PANSOU_URL: http://pansou:8888
      # 其他设置在网页设置页面填写，并自动保存到 ./data/.env。
      MEDIA_CONFIG_PATH: /app/data/.env
      STATIC_DIR: /app/frontend
      DB_PATH: /app/data/media_index.db
      CACHE_DIR: /app/data/cache
    volumes:
      - ./data:/app/data
    networks:
      - media-index-stack
    restart: unless-stopped

  # 可选：PanSou 搜索服务。首次使用时删除下方整段的“# ”即可启用。
  # pansou:
  #   image: ghcr.io/fish2018/pansou:latest
  #   pull_policy: always
  #   container_name: pansou
  #   ports:
  #     - "8888:8888"
  #   environment:
  #     PORT: 8888
  #     CACHE_ENABLED: "true"
  #     CACHE_PATH: /app/cache
  #     CACHE_TTL: 60
  #   volumes:
  #     - pansou-cache:/app/cache
  #   networks:
  #     - media-index-stack
  #   restart: unless-stopped

  # 可选：quark-auto-save (QAS) 转存服务。删除下方整段的“# ”后启用。
  # 启动前务必替换管理密码，然后在 QAS 网页配置夸克 Cookie。
  # quark-auto-save:
  #   image: cp0204/quark-auto-save:latest
  #   pull_policy: always
  #   container_name: quark-auto-save
  #   ports:
  #     - "5005:5005"
  #   environment:
  #     WEBUI_USERNAME: admin
  #     WEBUI_PASSWORD: change-this-qas-password
  #   volumes:
  #     - ./quark-auto-save/config:/app/config
  #     - ./quark-auto-save/media:/media
  #   networks:
  #     - media-index-stack
  #   restart: unless-stopped

volumes:
  pansou-cache:

networks:
  media-index-stack:
    name: media-index-stack
